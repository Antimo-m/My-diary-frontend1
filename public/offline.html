<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Diary offline</title>
    <style>
      body {
        align-items: center;
        background: linear-gradient(135deg, #fff3df, #dff8ff);
        color: #172026;
        display: grid;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        min-height: 100svh;
        padding: 1rem;
      }

      main {
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(41, 49, 61, 0.12);
        border-radius: 24px;
        box-shadow: 0 18px 45px rgba(24, 32, 46, 0.1);
        display: grid;
        gap: 1rem;
        margin: 0 auto;
        max-width: 30rem;
        padding: 1.25rem;
      }

      h1 {
        margin: 0;
      }

      p {
        color: #66717d;
        font-weight: 700;
        line-height: 1.55;
        margin: 0;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.65rem;
      }

      a,
      button {
        background: #126a7b;
        border: 0;
        border-radius: 12px;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 850;
        min-height: 2.65rem;
        padding: 0.65rem 0.9rem;
        text-decoration: none;
      }

      button {
        background: #d6a43a;
        color: #172026;
      }
    </style>
  </head>
  <body>
    <main>
      <div>
        <h1>Sei offline</h1>
        <p>Puoi riaprire le parti gia caricate di My Diary. Login, salvataggi, email e sincronizzazione richiedono la connessione.</p>
      </div>
      <div class="actions">
        <a href="/">Torna alla home</a>
        <button type="button" onclick="window.location.reload()">Riprova</button>
      </div>
    </main>
  </body>
</html>
